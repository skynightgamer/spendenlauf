<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spendenlauf — Live Tracker</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<!-- Apply saved theme before paint so there is no light flash on dark mode. -->
<script>
  (function () {
    try {
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  })();
</script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  /* ── Reset & base ────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Three-colour brand palette: blue, green, orange on white. */
    --blue:      #2563eb;
    --green:     #16a34a;
    --orange:    #ea580c;

    --bg:        #ffffff;
    --surface:   #ffffff;
    --border:    #e3e6ea;
    --text:      #111827;
    --text-dim:  #6b7280;

    /* Semantic aliases kept so the existing markup/JS need no changes. */
    --accent:    var(--green);
    --accent-2:  var(--blue);
    --gold:      var(--orange);
    --silver:    var(--blue);
    --bronze:    var(--green);
    --danger:    #dc2626;
    --radius:    0;
  }

  /* ── Dark mode ───────────────────────────────── */
  /* Toggled via data-theme on <html>; the brand colours brighten slightly so
     they stay legible on the dark surface. Semantic aliases inherit these. */
  :root[data-theme="dark"] {
    --blue:      #5b9dff;
    --green:     #34d27f;
    --orange:    #ff8a4c;

    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #2a313c;
    --text:      #e6edf3;
    --text-dim:  #8b98a9;
  }
  :root[data-theme="dark"] tr:hover td            { background: rgba(255,255,255,0.04); }
  :root[data-theme="dark"] .bib                   { background: #222b36; }
  :root[data-theme="dark"] .station-badge.none    { background: #222b36; }
  :root[data-theme="dark"] #course-map            { background: #0d1117; }

  /* Theme toggle button (header) */
  .header-right { display: flex; align-items: center; gap: 1rem; }
  .theme-toggle {
    font-family: inherit;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    padding: 0.3rem 0.55rem;
    font-size: 0.95rem;
    line-height: 1;
  }
  .theme-toggle:hover { color: var(--text); border-color: var(--text-dim); }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ── Header ──────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.1rem 1.6rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: clamp(1.4rem, 3.5vw, 2.2rem);
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  /* Tri-colour title: "Spen" blue, "den" green, "lauf" orange. */
  header h1 .t-blue   { color: var(--blue); }
  header h1 .t-green  { color: var(--green); }
  header h1 .t-orange { color: var(--orange); }
  .subtitle {
    color: var(--text-dim);
    font-size: 0.9rem;
    white-space: nowrap;
  }
  .live-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 1.5s infinite;
    vertical-align: middle;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: .4; transform: scale(1.4); }
  }

  /* Final-result banner, shown when the run has been stopped. */
  .finished-banner {
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    background: var(--green); color: #fff;
    padding: 0.7rem 1rem; font-weight: 700; font-size: 0.98rem;
    letter-spacing: 0.02em;
  }
  .finished-banner #finished-when { font-weight: 500; opacity: 0.9; }

  /* ── Layout ──────────────────────────────────── */
  /* Everything lives on one continuous sheet — no gaps, no rounded corners.
     Sections are separated only by hairline 1px dividers. */
  .container {
    max-width: none;
    margin: 0;
    padding: 0;
  }

  /* ── Stat cards ──────────────────────────────── */
  /* A single connected strip: cells share borders instead of floating apart.
     Container draws top/left, each cell draws right/bottom → seams stay 1px. */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 0;
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
  }
  .stat-card {
    background: var(--surface);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.1rem;
    text-align: center;
  }
  .stat-card .value {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }
  .stat-card .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-top: 0.3rem;
  }
  .stat-card.laps   .value { color: var(--green); }
  .stat-card.dist   .value { color: var(--blue); }
  .stat-card.money  .value { color: var(--orange); }
  .stat-card.pace   .value { color: var(--blue); }

  /* ── Two-column: leaderboard left, map right ─── */
  /* Flush against each other; a single divider sits between the two panels. */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    align-items: stretch;
    border-left: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  /* Allow each column to shrink below its content width so the leaderboard
     can scroll internally rather than overflow the panel border. */
  .main-grid > * { min-width: 0; }
  @media (max-width: 800px) {
    .main-grid { grid-template-columns: 1fr; }
  }
  .course-panel { display: flex; flex-direction: column; }

  /* ── Leaderboard ─────────────────────────────── */
  .panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .panel-title {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    padding: 0.9rem 1.1rem 0.6rem;
  }

  /* Let the leaderboard scroll horizontally instead of being clipped by the
     panel border when the column is narrow. */
  #leaderboard-body { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.86rem;
  }
  th {
    text-align: left;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    padding: 0.5rem 0.5rem;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }
  td {
    padding: 0.55rem 0.5rem;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f6f8fa; }

  .rank { font-weight: 700; width: 2.5rem; text-align: center; }
  .rank-1 { color: var(--orange); }
  .rank-2 { color: var(--blue); }
  .rank-3 { color: var(--green); }

  .bib {
    display: inline-block;
    background: #f1f3f5;
    color: var(--text);
    font-weight: 700;
    font-size: 0.78rem;
    padding: 0.15rem 0.5rem;
    border-radius: var(--radius);
    min-width: 2.4rem;
    text-align: center;
  }

  .laps-cell {
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .dist-cell {
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .donation-cell {
    color: var(--orange);
    font-variant-numeric: tabular-nums;
  }
  .pace-cell {
    color: var(--blue);
    font-variant-numeric: tabular-nums;
  }

  .station-badge {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 0.15rem 0.45rem;
    border-radius: var(--radius);
    background: rgba(22,163,74,0.10);
    color: var(--green);
  }
  .station-badge.none {
    background: #f1f3f5;
    color: var(--text-dim);
  }

  .empty-state {
    padding: 3rem 1rem;
    text-align: center;
    color: var(--text-dim);
    font-size: 0.9rem;
  }

  /* ── Course map (Leaflet) ────────────────────── */
  #course-map {
    flex: 1;
    min-height: 560px;
    width: 100%;
    border-radius: var(--radius);
    background: #eef1f4;
  }
  @media (max-width: 800px) {
    #course-map { min-height: 380px; }
  }
  /* Runner pins (initials) */
  /* Leaflet positions markers via `transform`; animating it makes pins glide
     between stations. Suppressed during zoom so they don't drift mid-animation. */
  .runner-pin-marker { transition: transform 0.8s ease-in-out; }
  .leaflet-zoom-anim .runner-pin-marker { transition: none; }
  .runner-pin {
    width: 28px; height: 28px;
    background: var(--orange);
    border: 2px solid #fff;
    border-radius: 50% 50% 50% 0;
    transform: rotate(45deg);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 5px rgba(0,0,0,0.30);
  }
  .runner-pin span {
    transform: rotate(-45deg);
    font-size: 0.7rem; font-weight: 800; color: #fff;
  }
  .map-empty {
    padding: 2.5rem 1rem;
    text-align: center;
    color: var(--text-dim);
    font-size: 0.9rem;
  }
  /* Numbered station markers drawn with a DivIcon */
  .station-marker {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: #fff;
    color: var(--text);
    border: 2px solid var(--blue);
    font-weight: 700;
    font-size: 0.8rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  }
  .station-marker.active {
    background: var(--green);
    color: #fff;
    border-color: var(--green);
  }
  .leaflet-popup-content { font-size: 0.85rem; }
  /* Stop a double-tap on the +/- buttons from triggering the browser's
     double-tap-to-zoom on the whole page (mobile). */
  .leaflet-control-zoom a { touch-action: manipulation; }

  /* ── Station status strip ────────────────────── */
  /* At-a-glance liveness for each checkpoint so a volunteer can spot a station
     that has gone dark (lost power / Wi-Fi) without reading the map. */
  /* Connected strip: chips share a divider, no gaps, sharp edges. */
  .stations-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    border-left: 1px solid var(--border);
  }
  .st-chip {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    /* Grow equally so the row fills the full width instead of leaving a
       gap on the right. flex-basis 0 → every chip ends up the same width. */
    flex: 1 1 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.6rem 0.9rem;
    font-size: 0.82rem;
    min-width: 0;
  }
  .st-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex: 0 0 auto;
    background: var(--text-dim);
  }
  .st-chip.online  .st-dot { background: var(--green); animation: pulse 2s infinite; }
  .st-chip.offline .st-dot { background: var(--danger); }
  .st-chip.offline { background: rgba(220,38,38,0.05); }
  .st-chip.never   .st-dot { background: var(--text-dim); }
  .st-name { font-weight: 600; }
  .st-meta { color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .st-chip.offline .st-meta { color: var(--danger); }
  .st-queued {
    color: var(--orange);
    font-size: 0.72rem;
    font-variant-numeric: tabular-nums;
  }
  /* On phones, stop cramming every chip into one row (flex-basis 0 keeps them
     from ever wrapping, so they shrink below their text and overlap). Give each
     a real minimum width so they wrap onto multiple rows instead. */
  @media (max-width: 800px) {
    .st-chip { flex: 1 1 45%; }
  }

  /* Sections below are toggled with the [hidden] attribute; their display rules
     (flex/grid) would otherwise win over the UA hidden rule, so force it. */
  [hidden] { display: none !important; }

  /* ── Donation goal thermometer ───────────────── */
  .goal-bar {
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 0.9rem 1.1rem;
  }
  .goal-head {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 0.78rem; color: var(--text-dim); margin-bottom: 0.5rem;
  }
  .goal-title { text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
  .goal-amount { font-variant-numeric: tabular-nums; }
  .goal-amount b { color: var(--orange); font-size: 1.05rem; }
  .goal-track {
    position: relative; height: 22px;
    background: #f1f3f5; border: 1px solid var(--border); overflow: hidden;
  }
  .goal-fill {
    height: 100%; width: 0%; background: var(--orange);
    transition: width 0.8s ease;
  }
  .goal-pct {
    position: absolute; top: 50%; left: 0.5rem; transform: translateY(-50%);
    font-size: 0.75rem; font-weight: 700;
    /* White over the orange fill; a faint shadow keeps it legible on the small
       slice of empty track at very low percentages. */
    color: #fff; text-shadow: 0 0 2px rgba(0,0,0,0.45);
    font-variant-numeric: tabular-nums;
  }
  /* Where the projected final total lands on the same scale. */
  .goal-proj { position: absolute; top: -1px; bottom: -1px; width: 2px; background: var(--blue); }
  :root[data-theme="dark"] .goal-track { background: #222b36; }
  /* Projection folded into the goal box (#1). */
  .goal-proj-text { margin-top: 0.5rem; font-size: 0.82rem; color: var(--text-dim); }
  .goal-proj-text b { color: var(--blue); font-variant-numeric: tabular-nums; }

  /* ── Records spotlight (rotates through superlatives) ── */
  .records {
    display: flex; align-items: baseline; gap: 0.6rem;
    background: var(--surface);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 1.1rem;
  }
  .rec-label {
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--text-dim); flex: 0 0 auto;
  }
  .rec-name  { font-weight: 700; }
  .rec-value { font-variant-numeric: tabular-nums; margin-left: auto; }
  .rec-value.c-green  { color: var(--green); }
  .rec-value.c-blue   { color: var(--blue); }
  .rec-value.c-orange { color: var(--orange); }

  /* ── Audience / Ops view (#4) ───────────────────── */
  /* Ops view hides audience fluff so volunteers see only hardware health. */
  body.mode-ops .goal-bar,
  body.mode-ops .records { display: none !important; }

  /* ── Leaderboard tabs (Einzel / Teams) ───────── */
  .lb-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .lb-tab {
    font-family: inherit; cursor: pointer;
    background: transparent; border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    font-size: 0.8rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 0.8rem 1.1rem;
  }
  .lb-tab:hover { color: var(--text); }
  .lb-tab.active { color: var(--text); border-bottom-color: var(--green); }

  /* Clickable runner rows in the Einzel leaderboard. */
  tr.clickable { cursor: pointer; }
  .team-tag {
    display: inline-block; font-size: 0.72rem; font-weight: 600;
    padding: 0.1rem 0.4rem; color: var(--text-dim);
    background: #f1f3f5; border-radius: var(--radius);
  }
  :root[data-theme="dark"] .team-tag { background: #222b36; }

  /* ── Runner detail modal ─────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
  }
  .modal {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    width: 100%; max-width: 480px;
    max-height: 88vh; overflow-y: auto;
    padding: 1.4rem 1.6rem;
  }
  .modal-close {
    position: absolute; top: 0.6rem; right: 0.6rem;
    background: transparent; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 1.1rem; line-height: 1;
    padding: 0.3rem;
  }
  .modal-close:hover { color: var(--text); }
  .m-name { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; }
  .m-sub { color: var(--text-dim); font-size: 0.85rem; margin-top: 0.15rem;
           display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
  .m-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    border-top: 1px solid var(--border); border-left: 1px solid var(--border);
    margin: 1.1rem 0;
  }
  .m-cell {
    border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
    padding: 0.7rem 0.8rem;
  }
  .m-cell .v { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em; }
  .m-cell .l { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.07em;
               color: var(--text-dim); margin-top: 0.15rem; }
  .m-cell.laps .v  { color: var(--green); }
  .m-cell.dist .v  { color: var(--blue); }
  .m-cell.money .v { color: var(--orange); }
  .m-cell.pace .v  { color: var(--blue); }
  .m-meta { font-size: 0.82rem; color: var(--text-dim); line-height: 1.7; }
  .m-meta b { color: var(--text); font-weight: 600; }
  .m-splits-title {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--text-dim); margin: 1.1rem 0 0.5rem;
  }
  .m-splits { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .m-splits td { padding: 0.35rem 0.4rem; border-bottom: 1px solid var(--border); }
  .m-splits td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
  .m-splits tr.best td { color: var(--green); font-weight: 700; }
  .m-empty { color: var(--text-dim); font-size: 0.85rem; }

  /* ── Footer ──────────────────────────────────── */
  footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.35rem 1.6rem;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.75rem;
  }
  footer span { color: var(--green); }
</style>
</head>

<body>
  <header>
    <h1><span class="t-blue">Spen</span><span class="t-green">den</span><span class="t-orange">lauf</span></h1>
    <div class="header-right">
      <div class="subtitle" id="subtitle"><span class="live-dot"></span>Live Tracker (3s)</div>
      <button class="theme-toggle" id="view-toggle" aria-label="Ansicht wechseln" title="Publikum / Technik">Technik</button>
      <button class="theme-toggle" id="theme-toggle" aria-label="Design wechseln" title="Hell/Dunkel">◐</button>
    </div>
  </header>

  <div class="container">
    <!-- Shown once the run has been stopped: final-result banner. -->
    <div class="finished-banner" id="finished-banner" hidden>
      🏁 Lauf beendet — Endergebnis<span id="finished-when"></span>
    </div>

    <!-- Stats row -->
    <div class="stats">
      <div class="stat-card laps">
        <div class="value" id="s-laps">—</div>
        <div class="label">Runden</div>
      </div>
      <div class="stat-card dist">
        <div class="value" id="s-dist">—</div>
        <div class="label">Kilometer</div>
      </div>
      <div class="stat-card money">
        <div class="value" id="s-money">—</div>
        <div class="label">Spenden €</div>
      </div>
      <div class="stat-card pace">
        <div class="value" id="s-pace">—</div>
        <div class="label">Ø Pace</div>
      </div>
    </div>

    <!-- Donation goal thermometer with the projection folded in (#1).
         Shown when a goal is set, or (no-goal) just the projection caption. -->
    <div class="goal-bar" id="goal-bar" hidden>
      <div class="goal-head">
        <span class="goal-title">Spendenziel</span>
        <span class="goal-amount" id="goal-amount"></span>
      </div>
      <div class="goal-track" id="goal-track">
        <div class="goal-fill" id="goal-fill"></div>
        <div class="goal-proj" id="goal-proj" hidden></div>
        <span class="goal-pct" id="goal-pct"></span>
      </div>
      <div class="goal-proj-text" id="goal-proj-text" hidden></div>
    </div>

    <!-- Records spotlight: one rotating superlative (#2) -->
    <div class="records" id="records" hidden>
      <span class="rec-label" id="rec-label"></span>
      <span class="rec-name"  id="rec-name"></span>
      <span class="rec-value" id="rec-value"></span>
    </div>

    <!-- Station liveness: green = reporting, red = gone dark -->
    <div class="stations-strip" id="stations-strip"></div>

    <!-- Leaderboard left, map right -->
    <div class="main-grid">
      <!-- Leaderboard (Einzel / Teams tabs share this panel) -->
      <div class="panel" id="leaderboard-panel">
        <div class="lb-tabs">
          <button class="lb-tab active" data-lb="single">Einzel</button>
          <button class="lb-tab" data-lb="team" hidden>Teams</button>
        </div>
        <div id="leaderboard-body"></div>
        <div id="team-body" hidden></div>
      </div>

      <!-- Course map -->
      <div class="panel course-panel">
        <div class="panel-title">Karte — Alle Läufer</div>
        <div id="course-map"></div>
        <div class="map-empty" id="map-empty" style="display:none;">
          Stationen noch nicht platziert.<br>
          Im <a href="/admin" style="color:var(--accent-2)">Admin-Bereich</a> einrichten.
        </div>
      </div>
    </div>
  </div>

  <footer>
    <div>Powered by <span>ESP32 + BLE</span></div>
    <a href="/admin" style="color:var(--text-dim)">Admin</a>
  </footer>

  <!-- Per-runner detail (opened by clicking a row in the Einzel leaderboard) -->
  <div class="modal-overlay" id="runner-modal" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modal-close" aria-label="Schließen">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

<script>
  // ── Config ────────────────────────────────────
  const API          = window.location.origin;
  const POLL_MS      = 3000;
  const DEFAULT_VIEW  = { center: [48.1157, 11.5798], zoom: 16 };  // Schyrenbad, München-Au

  // ── Theme toggle ──────────────────────────────
  const themeToggle = document.getElementById('theme-toggle');
  function syncThemeIcon() {
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    themeToggle.textContent = dark ? '◑' : '◐';
  }
  themeToggle.addEventListener('click', () => {
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = dark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('theme', next); } catch (e) {}
    syncThemeIcon();
  });
  syncThemeIcon();

  // ── Audience / Ops view toggle (#4) ───────────
  // Audience = stats/goal/records/leaderboard/map + collapsed station pill.
  // Ops      = hardware focus: full station strip, no audience fluff.
  const viewToggle = document.getElementById('view-toggle');
  let view = 'audience';
  try { view = localStorage.getItem('view') || 'audience'; } catch (e) {}
  let lastStations = null;        // last /stations/status payload, for re-render
  function applyView() {
    document.body.classList.toggle('mode-ops', view === 'ops');
    viewToggle.textContent = view === 'ops' ? 'Publikum' : 'Technik';
    if (lastStations) renderStations(lastStations);
  }
  viewToggle.addEventListener('click', () => {
    view = view === 'ops' ? 'audience' : 'ops';
    try { localStorage.setItem('view', view); } catch (e) {}
    applyView();
  });

  // ── Leaflet map setup ─────────────────────────
  let map = null;
  let routeLine = null;
  const markers = {};        // station id → Leaflet marker
  const stationCoords = {};  // station id → [lat, lng]
  const runnerPins = {};     // bib_number → Leaflet marker (persistent, so pins glide)

  function stationIcon(id, count) {
    const active = count > 0;
    return L.divIcon({
      className: '',
      html: `<div class="station-marker ${active ? 'active' : ''}">${id}</div>`,
      iconSize: [30, 30],
      iconAnchor: [15, 15],
    });
  }

  async function initMap() {
    const [stations, route] = await Promise.all([
      fetch(`${API}/api/stations`).then(r => r.json()),
      fetch(`${API}/api/route`).then(r => r.json()),
    ]);

    const placed = stations.filter(s => s.latitude != null && s.longitude != null);
    if (!placed.length && !(route.route && route.route.length)) {
      // Nothing has been set up yet → show hint instead of an empty map.
      document.getElementById('course-map').style.display = 'none';
      document.getElementById('map-empty').style.display = 'block';
      return;
    }

    map = L.map('course-map', {
      scrollWheelZoom: false,
    });
    // Leaflet focuses the map container on zoom (for keyboard nav). Chrome then
    // scrolls that focused element into view, snapping the whole page to the map
    // every time the +/- buttons are clicked. Suppress just the scroll.
    const mapContainer = map.getContainer();
    const nativeFocus = mapContainer.focus.bind(mapContainer);
    mapContainer.focus = opts => nativeFocus(Object.assign({ preventScroll: true }, opts));
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap',
    }).addTo(map);

    if (route.route && route.route.length) {
      routeLine = L.polyline(route.route, { color: '#16a34a', weight: 4 }).addTo(map);
    }

    placed.forEach(s => {
      stationCoords[s.id] = [s.latitude, s.longitude];
      const m = L.marker([s.latitude, s.longitude], {
        icon: stationIcon(s.id, 0),
      }).addTo(map).bindPopup(`<b>${s.name}</b>`);
      m.stationName = s.name;
      markers[s.id] = m;
    });

    // Centre on the middle of all markers, zoomed so every marker is visible.
    const bounds = placed.map(s => [s.latitude, s.longitude]).concat(route.route || []);
    if (bounds.length) map.fitBounds(bounds, { padding: [45, 45], maxZoom: 17 });
    else map.setView(DEFAULT_VIEW.center, DEFAULT_VIEW.zoom);

    // The map column stretches taller once the leaderboard fills in, leaving the
    // lower tiles unloaded until interaction. Re-measure whenever it resizes.
    const fitToBounds = () => { if (bounds.length) map.fitBounds(bounds, { padding: [45, 45], maxZoom: 17 }); };
    const mapEl = document.getElementById('course-map');
    if (window.ResizeObserver) {
      new ResizeObserver(() => { map.invalidateSize(); }).observe(mapEl);
    }
    window.addEventListener('resize', () => map.invalidateSize());
    setTimeout(() => { map.invalidateSize(); fitToBounds(); }, 200);
  }

  // ── Render helpers ────────────────────────────

  function rankClass(i) {
    if (i === 0) return 'rank-1';
    if (i === 1) return 'rank-2';
    if (i === 2) return 'rank-3';
    return '';
  }

  // Pace in min/km → "M:SS" (e.g. 5.5 → "5:30").
  function fmtPace(minPerKm) {
    if (!minPerKm || minPerKm <= 0) return '—';
    const total = Math.round(minPerKm * 60);
    const m = Math.floor(total / 60), s = total % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  function timeAgo(iso) {
    if (!iso) return '—';
    const diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 60)   return `${Math.round(diff)}s`;
    if (diff < 3600) return `${Math.round(diff / 60)}m`;
    return `${Math.round(diff / 3600)}h`;
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function renderLeaderboard(rows) {
    const el = document.getElementById('leaderboard-body');
    if (!rows.length) {
      el.innerHTML = `<div class="empty-state">Noch keine Läufer registriert.<br>
        Starte <code>python simulate.py</code> zum Testen.</div>`;
      return;
    }

    let html = `<table><thead><tr>
      <th>#</th><th>Nr.</th><th>Name</th><th>Runden</th>
      <th>km</th><th>Pace</th><th>Station</th><th>Spende</th>
    </tr></thead><tbody>`;

    rows.forEach((r, i) => {
      const st = r.last_station_id
        ? `<span class="station-badge">S${r.last_station_id}</span>`
        : `<span class="station-badge none">—</span>`;
      const don = r.donations > 0 ? `€${r.donations.toFixed(2)}` : '—';
      html += `<tr class="clickable" data-bib="${r.bib_number}">
        <td class="rank ${rankClass(i)}">${i + 1}</td>
        <td><span class="bib">${r.bib_number}</span></td>
        <td>${esc(r.name)}</td>
        <td class="laps-cell">${r.laps}</td>
        <td class="dist-cell">${r.distance_km.toFixed(2)}</td>
        <td class="pace-cell">${fmtPace(r.pace_min_km)}</td>
        <td>${st}</td>
        <td class="donation-cell">${don}</td>
      </tr>`;
    });

    html += '</tbody></table>';
    el.innerHTML = html;

    el.querySelectorAll('tr.clickable').forEach(tr =>
      tr.addEventListener('click', () => openRunner(Number(tr.dataset.bib))));
  }

  // ── Team leaderboard ──────────────────────────
  function renderTeams(teams) {
    const el = document.getElementById('team-body');
    // Hide the Teams tab entirely when no real teams are configured.
    const real = teams.filter(t => t.team);
    const tabBtn = document.querySelector('.lb-tab[data-lb="team"]');
    if (!real.length) {
      tabBtn.hidden = true;
      el.innerHTML = '';
      if (lbView === 'team') setLbView('single');
      return;
    }
    tabBtn.hidden = false;

    let html = `<table><thead><tr>
      <th>#</th><th>Team</th><th>Läufer</th><th>Runden</th><th>km</th><th>Spende</th>
    </tr></thead><tbody>`;
    real.forEach((t, i) => {
      const don = t.donations > 0 ? `€${t.donations.toFixed(2)}` : '—';
      html += `<tr>
        <td class="rank ${rankClass(i)}">${i + 1}</td>
        <td>${esc(t.team)}</td>
        <td class="dist-cell">${t.runners}</td>
        <td class="laps-cell">${t.laps}</td>
        <td class="dist-cell">${t.distance_km.toFixed(2)}</td>
        <td class="donation-cell">${don}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  }

  // ── Leaderboard tab switching ─────────────────
  let lbView = 'single';
  function setLbView(view) {
    lbView = view;
    document.getElementById('leaderboard-body').hidden = view !== 'single';
    document.getElementById('team-body').hidden        = view !== 'team';
    document.querySelectorAll('.lb-tab').forEach(b =>
      b.classList.toggle('active', b.dataset.lb === view));
  }
  document.querySelectorAll('.lb-tab').forEach(b =>
    b.addEventListener('click', () => setLbView(b.dataset.lb)));

  function renderStations(data) {
    const el = document.getElementById('stations-strip');
    // Station liveness is hardware health — only shown in the Technik (ops) view,
    // hidden from the public Publikum view.
    if (view !== 'ops') { el.innerHTML = ''; return; }
    const stations = (data && data.stations) || [];
    if (!stations.length) { el.innerHTML = ''; return; }

    el.innerHTML = stations.map(s => {
      let cls, meta;
      if (s.seconds_ago == null) {
        cls = 'never';  meta = 'noch nie';
      } else if (s.online) {
        cls = 'online'; meta = `vor ${timeAgo(s.last_seen)}`;
      } else {
        cls = 'offline'; meta = `⚠ seit ${timeAgo(s.last_seen)} offline`;
      }
      const q = s.queued > 0 ? `<span class="st-queued">⏳ ${s.queued} gepuffert</span>` : '';
      return `<div class="st-chip ${cls}">
        <span class="st-dot"></span>
        <span class="st-name">${esc(s.name)}</span>
        <span class="st-meta">${meta}</span>
        ${q}
      </div>`;
    }).join('');
  }

  function renderStats(s) {
    document.getElementById('s-laps').textContent    = s.total_laps;
    document.getElementById('s-dist').textContent    = s.total_distance_km.toFixed(1);
    document.getElementById('s-money').textContent   = s.total_donations.toFixed(2);
    document.getElementById('s-pace').textContent    = fmtPace(s.avg_pace_min_km);
    renderGoal(s);
    renderRunState(s);
  }

  // Reflect a stopped run: swap the live indicator for a "finished" state and
  // reveal the final-result banner. Flips back to live if a new run is started.
  function renderRunState(s) {
    const stopped  = !!s.event_stopped;
    const subtitle = document.getElementById('subtitle');
    const banner   = document.getElementById('finished-banner');
    banner.hidden = !stopped;
    if (stopped) {
      subtitle.innerHTML = '🏁 Lauf beendet';
      document.getElementById('finished-when').textContent =
        ' · ' + new Date(s.event_stopped).toLocaleString('de-DE');
    } else {
      subtitle.innerHTML = '<span class="live-dot"></span>Live Tracker (3s)';
      document.getElementById('finished-when').textContent = '';
    }
  }

  function fmtClock(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  }

  // ── Donation goal thermometer + folded-in projection (#1) ──
  function renderGoal(s) {
    const el = document.getElementById('goal-bar');
    const goal = s.donation_goal || 0;
    const hasProj = s.projected_donations != null || s.projected_distance_km != null;
    if (goal <= 0 && !hasProj) { el.hidden = true; return; }
    el.hidden = false;

    const track = document.getElementById('goal-track');
    const head  = document.getElementById('goal-amount');
    const title = el.querySelector('.goal-title');

    if (goal > 0) {
      title.textContent = 'Spendenziel';
      track.hidden = false; head.hidden = false;
      const cur = s.total_donations || 0;
      const pct = Math.min(100, (cur / goal) * 100);
      document.getElementById('goal-fill').style.width = pct.toFixed(1) + '%';
      document.getElementById('goal-pct').textContent  = pct.toFixed(0) + '%';
      head.innerHTML = `<b>€${cur.toFixed(2)}</b> / €${goal.toFixed(2)}`;
      // Tick showing where the projected final total lands on the same scale.
      const mark = document.getElementById('goal-proj');
      if (s.projected_donations != null) {
        mark.hidden = false;
        mark.style.left = Math.min(100, (s.projected_donations / goal) * 100).toFixed(1) + '%';
        mark.title = `Hochrechnung: €${s.projected_donations.toFixed(2)}`;
      } else {
        mark.hidden = true;
      }
    } else {
      // No goal set, but there's a projection worth showing.
      title.textContent = 'Hochrechnung';
      track.hidden = true; head.hidden = true;
    }

    // Projection caption, folded into the goal box instead of its own strip.
    const cap = document.getElementById('goal-proj-text');
    if (hasProj) {
      cap.hidden = false;
      const until = s.event_end ? ` bis ${fmtClock(s.event_end)} Uhr` : '';
      const parts = [];
      if (s.projected_donations != null)   parts.push(`<b>€${s.projected_donations.toFixed(2)}</b>`);
      if (s.projected_distance_km != null) parts.push(`<b>${s.projected_distance_km.toFixed(1)} km</b>`);
      cap.innerHTML = `Hochrechnung${until}: ${parts.join(' · ')}`;
    } else {
      cap.hidden = true;
    }
  }

  // ── Records spotlight (#2): one superlative at a time, rotating ──
  let recordCards = [];
  let recordIdx = 0;

  function renderRecords(rows) {
    const el = document.getElementById('records');
    const ran = rows.filter(r => r.distance_km > 0);
    if (!ran.length) { recordCards = []; el.hidden = true; return; }
    const maxBy = (a, f) => a.reduce((x, y) => (f(y) > f(x) ? y : x));
    const minBy = (a, f) => a.reduce((x, y) => (f(y) < f(x) ? y : x));

    const mostLaps = maxBy(ran, r => r.laps);
    const farthest = maxBy(ran, r => r.distance_km);
    const paced    = ran.filter(r => r.pace_min_km > 0);
    const fastest  = paced.length ? minBy(paced, r => r.pace_min_km) : null;
    const donors   = ran.filter(r => r.donations > 0);
    const topDonor = donors.length ? maxBy(donors, r => r.donations) : null;

    recordCards = [
      ['c-green',  'Meiste Runden',    mostLaps.name, `${mostLaps.laps} Runden`],
      ['c-blue',   'Weiteste Strecke', farthest.name, `${farthest.distance_km.toFixed(2)} km`],
      fastest  ? ['c-blue',   'Schnellste Pace', fastest.name,  `${fmtPace(fastest.pace_min_km)} /km`] : null,
      topDonor ? ['c-orange', 'Top-Spender',     topDonor.name, `€${topDonor.donations.toFixed(2)}`]   : null,
    ].filter(Boolean);

    el.hidden = false;
    if (recordIdx >= recordCards.length) recordIdx = 0;
    showRecord();
  }

  function showRecord() {
    if (!recordCards.length) return;
    const [cls, label, name, value] = recordCards[recordIdx % recordCards.length];
    document.getElementById('rec-label').textContent = label;
    document.getElementById('rec-name').textContent  = name;
    const v = document.getElementById('rec-value');
    v.textContent = value;
    v.className = 'rec-value ' + cls;
  }

  // Rotate the spotlight every 4s.
  setInterval(() => {
    if (recordCards.length) {
      recordIdx = (recordIdx + 1) % recordCards.length;
      showRecord();
    }
  }, 4000);

  // ── Runner detail modal ───────────────────────
  // Seconds → "M:SS" or "H:MM:SS".
  function fmtDuration(s) {
    if (s == null || s < 0) return '—';
    s = Math.round(s);
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
    const pad = n => String(n).padStart(2, '0');
    return h ? `${h}:${pad(m)}:${pad(sec)}` : `${m}:${pad(sec)}`;
  }

  async function openRunner(bib) {
    const modal = document.getElementById('runner-modal');
    const body  = document.getElementById('modal-body');
    body.innerHTML = '<div class="m-empty">Lädt…</div>';
    modal.hidden = false;
    try {
      const d = await fetch(`${API}/api/runners/${bib}/detail`).then(r => r.json());
      renderRunnerModal(d);
    } catch (e) {
      body.innerHTML = '<div class="m-empty">Konnte Daten nicht laden.</div>';
    }
  }

  function renderRunnerModal(d) {
    const team = d.team ? `<span class="team-tag">${esc(d.team)}</span>` : '';
    const st   = d.last_station_id ? `S${d.last_station_id}` : '—';
    const splits = d.laps_detail || [];
    const splitsHtml = splits.length
      ? '<table class="m-splits"><tbody>' + splits.map(s =>
          `<tr class="${d.best_lap_seconds != null && s.seconds === d.best_lap_seconds ? 'best' : ''}">` +
          `<td>Runde ${s.lap}</td><td>${fmtDuration(s.seconds)}</td></tr>`).join('') +
        '</tbody></table>'
      : '<div class="m-empty">Noch keine vollständige Runde.</div>';

    document.getElementById('modal-body').innerHTML = `
      <div class="m-name">${esc(d.name)}</div>
      <div class="m-sub"><span class="bib">${d.bib_number}</span> ${team}</div>
      <div class="m-grid">
        <div class="m-cell laps"><div class="v">${d.laps}</div><div class="l">Runden</div></div>
        <div class="m-cell dist"><div class="v">${d.distance_km.toFixed(2)}</div><div class="l">Kilometer</div></div>
        <div class="m-cell money"><div class="v">€${d.donations.toFixed(2)}</div><div class="l">Spende</div></div>
        <div class="m-cell pace"><div class="v">${fmtPace(d.pace_min_km)}</div><div class="l">Ø Pace /km</div></div>
      </div>
      <div class="m-meta">
        <div>Aktuelle Station: <b>${st}</b></div>
        <div>Zuletzt gesehen: <b>${d.last_seen_time ? 'vor ' + timeAgo(d.last_seen_time) : '—'}</b></div>
        <div>Geschwindigkeit: <b>${d.speed_kmh ? d.speed_kmh.toFixed(1) + ' km/h' : '—'}</b></div>
        <div>Laufzeit (netto): <b>${fmtDuration(d.moving_seconds)}</b></div>
        <div>Schnellste / Ø Runde: <b>${fmtDuration(d.best_lap_seconds)} / ${fmtDuration(d.avg_lap_seconds)}</b></div>
      </div>
      <div class="m-splits-title">Rundenzeiten</div>
      ${splitsHtml}`;
  }

  function closeRunner() { document.getElementById('runner-modal').hidden = true; }
  document.getElementById('modal-close').addEventListener('click', closeRunner);
  document.getElementById('runner-modal').addEventListener('click', e => {
    if (e.target.id === 'runner-modal') closeRunner();   // click outside the card
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeRunner(); });

  function renderCourseMap(rows) {
    if (!map) return;
    // Count runners currently at each station.
    const counts = {};
    rows.forEach(r => {
      if (r.last_station_id) counts[r.last_station_id] = (counts[r.last_station_id] || 0) + 1;
    });

    Object.entries(markers).forEach(([id, marker]) => {
      const n = counts[id] || 0;
      marker.setIcon(stationIcon(id, n));
      marker.setPopupContent(`<b>${marker.stationName}</b><br>${n} Läufer aktuell hier`);
    });
  }

  // Initials: first letter of first name + first letter of last name.
  function initials(name) {
    const p = (name || '').trim().split(/\s+/).filter(Boolean);
    if (!p.length) return '?';
    return ((p[0][0] || '') + (p.length > 1 ? p[p.length - 1][0] : '')).toUpperCase();
  }

  function runnerIcon(text) {
    return L.divIcon({
      className: 'runner-pin-marker',
      html: `<div class="runner-pin"><span>${text}</span></div>`,
      iconSize: [28, 28],
      iconAnchor: [14, 28],
      popupAnchor: [0, -26],
    });
  }

  // Show every runner as a pin at the station they last passed. Markers persist
  // across refreshes and are repositioned with setLatLng so they glide to the
  // new station (CSS transition) instead of blinking out and back.
  function renderRunnerPins(rows) {
    if (!map) return;
    const top = rows.filter(r => r.last_station_id && stationCoords[r.last_station_id]);
    const seen = {};       // station id → how many pins already placed there
    const stillHere = new Set();

    top.forEach((r, idx) => {
      const base = stationCoords[r.last_station_id];
      const k = seen[r.last_station_id] = (seen[r.last_station_id] || 0);
      seen[r.last_station_id]++;
      // Fan multiple runners at one station onto concentric rings (centre + rings
      // of 6) so even a bunched start stays readable instead of stacking pins.
      const PER_RING = 6;
      const ring = k === 0 ? 0 : Math.floor((k - 1) / PER_RING) + 1;
      const inRing = (k - 1) % PER_RING;
      // Offset alternate rings by half a step so outer pins sit between inner ones.
      const ang = inRing * (2 * Math.PI / PER_RING) + (ring % 2) * (Math.PI / PER_RING);
      const rad = ring * 0.00018;
      const pos = [base[0] + rad * Math.cos(ang), base[1] + rad * Math.sin(ang)];
      const popup = `<b>${r.name}</b><br>Platz ${idx + 1} · ${r.laps} Runden · S${r.last_station_id}`;

      let m = runnerPins[r.bib_number];
      if (m) {
        m.setLatLng(pos);
        m.setPopupContent(popup);
      } else {
        m = L.marker(pos, { icon: runnerIcon(initials(r.name)), zIndexOffset: 1000 })
              .addTo(map).bindPopup(popup);
        runnerPins[r.bib_number] = m;
      }
      stillHere.add(r.bib_number);
    });

    // Drop pins for runners that fell out of the top list.
    Object.keys(runnerPins).forEach(bib => {
      if (!stillHere.has(Number(bib))) {
        map.removeLayer(runnerPins[bib]);
        delete runnerPins[bib];
      }
    });
  }

  // ── Polling loop ──────────────────────────────

  async function refresh() {
    try {
      const [lb, st, ss, tm] = await Promise.all([
        fetch(`${API}/api/leaderboard`).then(r => r.json()),
        fetch(`${API}/api/stats`).then(r => r.json()),
        fetch(`${API}/api/stations/status`).then(r => r.json()),
        fetch(`${API}/api/teams`).then(r => r.json()),
      ]);
      lastStations = ss;
      renderLeaderboard(lb);
      renderStats(st);
      renderStations(ss);
      renderCourseMap(lb);
      renderRunnerPins(lb);
      renderRecords(lb);
      renderTeams(tm);
    } catch (err) {
      console.warn('Refresh failed:', err);
    }
  }

  applyView();
  initMap().catch(err => console.warn('Map init failed:', err));
  refresh();
  setInterval(refresh, POLL_MS);
</script>
</body>
</html>
